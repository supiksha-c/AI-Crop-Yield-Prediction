<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction History</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="login-container">

<h1>🌾 Prediction History</h1>

<table border="1" width="100%">
<tr>
<th>Crop</th>
<th>Temp</th>
<th>Humidity</th>
<th>Rainfall</th>
<th>pH</th>
<th>Yield</th>
</tr>

<tbody id="historyBody">
</tbody>

</table>

<br>

<button onclick="location.href='/dashboard'">
⬅ Back to Dashboard
</button>

</div>

<script>

let data = JSON.parse(localStorage.getItem("predictionHistory")) || [];

let rows = "";

data.forEach(item => {
    rows += `
    <tr>
        <td>${item.crop}</td>
        <td>${item.temp}</td>
        <td>${item.humidity}</td>
        <td>${item.rainfall}</td>
        <td>${item.ph}</td>
        <td>${item.yield} Tons/Hectare</td>
    </tr>`;
});

document.getElementById("historyBody").innerHTML = rows;

</script>

</body>
</html>
